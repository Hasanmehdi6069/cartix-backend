<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartix Command Center</title>
    <style>
        /* =======================================================
           🛡️ CARTIX ADMIN DARK THEME
           ======================================================= */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d0e14; color: #ffffff; margin: 0; display: flex; }
        
        /* The Frontend Vault Lock */
        #vault-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #0d0e14; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .vault-box { background: #1c1d26; padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #2a2c3a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .vault-box input { background: #0d0e14; border: 1px solid #ffaa00; color: white; padding: 12px; margin: 20px 0; width: 100%; border-radius: 6px; outline: none; text-align: center; letter-spacing: 2px;}
        
        /* Dashboard Layout */
        .sidebar { width: 260px; background: #15161d; height: 100vh; padding: 20px; border-right: 1px solid #2a2c3a; position: fixed; }
        .sidebar h2 { color: #ffaa00; margin-bottom: 40px; text-align: center; letter-spacing: 1px; }
        .menu-item { padding: 15px; margin-bottom: 10px; background: #1c1d26; border-radius: 8px; cursor: pointer; border-left: 3px solid transparent; transition: 0.3s;}
        .menu-item:hover, .menu-item.active { border-left: 3px solid #ffaa00; background: #2a2c3a; }
        
        .main-content { margin-left: 260px; padding: 40px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2c3a; padding-bottom: 20px; margin-bottom: 30px; }
        
        /* Cards & Forms */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #15161d; padding: 25px; border-radius: 12px; border: 1px solid #2a2c3a; }
        .card h3 { margin-top: 0; color: #ffaa00; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 5px; color: #aaa; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #0d0e14; border: 1px solid #2a2c3a; color: white; border-radius: 6px; }
        
        .btn { background: #ffaa00; color: #15161d; border: none; padding: 12px 24px; font-weight: 800; border-radius: 6px; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn:hover { background: #e69900; }
    </style>
</head>
<body>

    <div id="vault-lock">
        <div class="vault-box">
            <h2>🛒 CARTIX <span style="color:#ffaa00;">COMMAND</span></h2>
            <p style="color:#aaa; font-size:14px;">Restricted CEO Access Only</p>
            <input type="password" id="master-pass" placeholder="Enter Master Key">
            <button class="btn" onclick="unlockVault()">ACCESS SERVER</button>
            <p id="lock-error" style="color:#ff4444; font-size:13px; display:none; margin-top:15px;">Access Denied. Breach Attempt Logged.</p>
        </div>
    </div>

    <div class="sidebar">
        <h2>CARTIX <span style="color:white;">ADMIN</span></h2>
        <div class="menu-item active">📦 Add Products</div>
        <div class="menu-item">📋 Live Orders</div>
        <div class="menu-item">👥 User Database</div>
        <div class="menu-item" style="margin-top: 50px; color:#ff4444; text-align:center;" onclick="location.reload()">🔒 Lock Vault</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Product Management Engine</h1>
            <div style="background:#2a2c3a; padding:8px 15px; border-radius:20px; font-size:13px; color:#4CAF50;">🟢 Server Live</div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Deploy New Product</h3>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" placeholder="e.g., iPhone 16 Pro">
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="prod-price" placeholder="129999">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="prod-img" placeholder="https://unsplash.com/...">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="prod-cat" placeholder="Electronics, Fashion, etc.">
                </div>
                <button class="btn" onclick="deployProduct()">🚀 Push to Database</button>
            </div>

            <div class="card">
                <h3>System Status</h3>
                <h1 style="font-size: 40px; margin: 10px 0 0 0;">₹0.00</h1>
                <p style="color:#aaa; margin-top:5px;">Total Revenue Generated</p>
                
                <h1 style="font-size: 40px; margin: 30px 0 0 0;">0</h1>
                <p style="color:#aaa; margin-top:5px;">Active Database Products</p>
            </div>
        </div>
    </div>

    <script>
        // =======================================================
        // 🧠 COMMAND CENTER LOGIC
        // =======================================================
        
        // 1. The Vault Security (Hardcoded MVP Lock)
        function unlockVault() {
            const pass = document.getElementById('master-pass').value;
            // CHANGE THIS TO YOUR SECRET PASSWORD!
            if(pass === "CEO2026") { 
                document.getElementById('vault-lock').style.display = 'none';
            } else {
                document.getElementById('lock-error').style.display = 'block';
            }
        }

        // 2. Product Deployment Engine (Wired to Render Cloud)
        async function deployProduct() {
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            const image = document.getElementById('prod-img').value;
            const category = document.getElementById('prod-cat').value;
            const btn = document.querySelector('.card .btn');
            
            if(!name || !price) {
                alert("⚠️ Error: Product Name and Price are strictly required.");
                return;
            }

            // UI feedback while the server processes
            btn.innerText = "⏳ Deploying to Cloud...";
            btn.style.background = "#555";

            try {
                const response = await fetch('https://cartix-api.onrender.com/api/admin/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminKey: "CARTIX_CEO_2026_SECURE", // Must match backend exactly!
                        name: name,
                        price: Number(price),
                        image: image,
                        category: category
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Show alert and clear the form
                    alert(`✅ SUCCESS: ${data.message}`);
                    document.getElementById('prod-name').value = '';
                    document.getElementById('prod-price').value = '';
                    document.getElementById('prod-img').value = '';
                    document.getElementById('prod-cat').value = '';
                } else {
                    alert(`❌ SERVER REJECTED: ${data.error}`);
                }
            } catch (err) {
                alert(`❌ CRITICAL ERROR: Could not reach the Render API. Is the server awake?`);
            } finally {
                // Reset button
                btn.innerText = "🚀 Push to Database";
                btn.style.background = "#ffaa00";
            }
        }
    </script>
</body>
</html>
